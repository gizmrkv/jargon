method: "grid"
project: "jargon"
name: "signaling seed sweep 1"

metric:
  name: "sig/test/acc/part.mean"
  goal: "maximize"

parameters:
  seed:
    min: 0
    max: 9

  num_elems:
    value: 50
  num_attrs:
    value: 2
  train_proportion:
    value: 0.8
  test_proportion:
    value: 0.2
  vocab_size:
    value: 50
  max_len:
    value: 8
  max_epochs:
    value: 2001
  batch_size:
    value: 4096
  lr:
    value: 0.001
  test_per_epoch:
    value: 25
  heavy_test_per_test:
    value: 4
  show_progress:
    value: true
  use_amp:
    value: true
  entropy_loss_weight:
    value: 0.0
  length_loss_weight:
    value: 0.0
  encoder_embedding_dim:
    value: 8
  encoder_hidden_sizes:
    value: [64]
  encoder_activation_type:
    value: "GELU"
  encoder_normalization_type:
    value: "LayerNorm"
  encoder_dropout:
    value: 0.0
  sender_input_dim:
    value: 64
  sender_embedding_dim:
    value: 8
  sender_hidden_size:
    value: 256
  sender_num_layers:
    value: 2
  sender_cell_type:
    value: "GRU"
  decoder_hidden_sizes:
    value: [64]
  decoder_activation_type:
    value: "GELU"
  decoder_normalization_type:
    value: "LayerNorm"
  decoder_dropout:
    value: 0.0
  receiver_output_dim:
    value: 64
  receiver_embedding_dim:
    value: 8
  receiver_hidden_size:
    value: 256
  receiver_num_layers:
    value: 2
  receiver_cell_type:
    value: "GRU"

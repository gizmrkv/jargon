method: "grid"
project: "jargon"
name: "identity seed sweep 1"

metric:
  name: "id/test/acc/part.mean"
  goal: "maximize"

parameters:
  seed:
    min: 0
    max: 9

  num_elems:
    value: 50
  num_attrs:
    value: 2
  train_proportion:
    value: 0.8
  test_proportion:
    value: 0.2
  max_epochs:
    value: 500
  batch_size:
    value: 4096
  lr:
    value: 0.001
  test_per_epoch:
    value: 10
  show_progress:
    value: true
  use_amp:
    value: true
  embedding_dim:
    value: 8
  hidden_sizes:
    value: [64]
  activation_type:
    value: "GELU"
  normalization_type:
    value: "LayerNorm"
  dropout:
    value: 0.0

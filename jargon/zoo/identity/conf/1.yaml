# Sweep seed value
method: "grid"
name: "identity seed sweep"
project: "jargon"

metric:
  name: "sv/test/acc_part.mean"
  goal: "maximize"

parameters:
  seed:
    min: 0
    max: 9
  device:
    value: "cuda"

  num_elems:
    value: 50
  num_attrs:
    value: 2
  train_proportion:
    value: 0.8
  test_proportion:
    value: 0.2
  batch_size:
    value: 4096

  model_args:
    value:
      embedding_dim: 16
      hidden_sizes: [64, 64]
      activation_type: "ReLU"
  lr:
    value: 0.001

  max_epochs:
    value: 400
  test_per_epoch:
    value: 10
  show_progress:
    value: True
  use_amp:
    value: True

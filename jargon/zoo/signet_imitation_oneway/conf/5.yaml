method: "grid"
project: "jargon"
name: "signet_imitation_oneway_5"

metric:
  name: "test/acc/part.mean.mean"
  goal: "maximize"

parameters:
  seed:
    min: 0
    max: 2
  max_epochs:
    value: 10001
  num_elems:
    value: 10
  num_attrs:
    value: 3
  vocab_size:
    value: 10
  max_len:
    value: 10
  imitation:
    value: true
  imitation_threshold:
    value: 0.99
  entropy_loss_weight:
    value: 0.1
  length_loss_weight:
    value: 0.0
  additional_imitation_edges:
    value: "S8->S0"
  num_senders:
    value: 9
  sender_hidden_size:
    value: 200
  sender_num_layers:
    value: 1
  sender_cell_type:
    value: "GRU"
  receiver_hidden_size:
    value: 200
  receiver_num_layers:
    value: 1
  receiver_cell_type:
    value: "GRU"
  reset_senders_interval:
    value: 1000
  reset_num_senders_once:
    values: [0, 1, 2, 4, 8]
